<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紐西蘭圓夢計畫 ✈️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f0f4f8; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); border: 1px solid #e1e8ed; }
        h1 { font-size: 24px; color: #1a508b; text-align: center; }
        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save { background: var(--accent); color: white; }
        .btn-target { background: #3498db; color: white; font-size: 12px; padding: 5px 10px; width: auto; margin: 0; }
        .progress-bar { background: #eee; border-radius: 20px; height: 25px; overflow: hidden; position: relative; border: 1px solid #ddd; margin: 10px 0; }
        .progress-fill { background: linear-gradient(90deg, #2ecc71, #27ae60); height: 100%; width: 0%; transition: 1s ease-out; }
        .progress-text { position: absolute; width: 100%; text-align: center; line-height: 25px; font-size: 13px; font-weight: bold; }
        .stats { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇳🇿 紐西蘭存錢大作戰</h1>

    <div class="card">
        <h3>💰 我今天存了錢</h3>
        <select id="member">
            <option value="公公">公公</option>
            <option value="婆婆">婆婆</option>
            <option value="媽媽">媽媽</option>
        </select>
        <input type="number" id="amount" placeholder="金額 (例如：500)" style="margin-top:10px;">
        <button class="btn-save" onclick="saveData()">紀錄存錢</button>
    </div>

    <div id="status-container">載入中...</div>
</div>

<script>
    // ⚠️ 這裡請換成你自己的專案資訊 ⚠️
    const SUPABASE_URL = 'https://lojahgnfzrzqlxkogayw.supabase.co'; 
    const SUPABASE_KEY = 'sb_secret_N2rwAhFA8yHnvwwSbLibmg_pSFPY8B3';

    // 初始化 Supabase
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchData() {
        const { data, error } = await client.from('savings').select('*');
        if (error) {
            document.getElementById('status-container').innerHTML = "資料載入失敗，請檢查金鑰";
            return;
        }

        let html = "";
        const members = ["公公", "婆婆", "媽媽"];
        
        members.forEach(m => {
            const total = data.filter(d => d.member === m && d.amount).reduce((sum, d) => sum + d.amount, 0);
            const targetEntry = data.filter(d => d.member === m && d.target).sort((a,b) => b.id - a.id)[0];
            const currentTarget = targetEntry ? targetEntry.target : 100000;
            const percent = Math.min((total / currentTarget) * 100, 100).toFixed(1);

            html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${m}</strong>
                        <button class="btn-target" onclick="updateTarget('${m}')">設目標</button>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-text">${percent}%</div>
                        <div class="progress-fill" style="width: ${percent}%"></div>
                    </div>
                    <div class="stats">
                        <span>已存: $${total.toLocaleString()}</span>
                        <span>目標: $${currentTarget.toLocaleString()}</span>
                    </div>
                </div>`;
        });
        document.getElementById('status-container').innerHTML = html;
    }

    async function saveData() {
        const member = document.getElementById('member').value;
        const amount = parseInt(document.getElementById('amount').value);

        if (!amount || amount <= 0) return alert("請輸入金額！");

        const { error } = await client.from('savings').insert([{ member, amount }]);
        if (error) alert("儲存失敗: " + error.message);
        else {
            alert("✅ 紀錄成功！");
            document.getElementById('amount').value = "";
            fetchData();
        }
    }

    async function updateTarget(name) {
        const newTarget = prompt(`請輸入 ${name} 的新目標：`, "100000");
        if (newTarget && !isNaN(newTarget)) {
            await client.from('savings').insert([{ member: name, target: parseInt(newTarget), amount: 0 }]);
            fetchData();
        }
    }

    fetchData();
</script>
</body>
</html>
